; mypy.ini
; Use this file when pyproject.toml is owned by another tool or when you
; prefer a standalone mypy config. If using pyproject.toml, put these
; settings under [tool.mypy] instead and delete this file.

[mypy]
; --- Target Python version (keep in sync with pyproject.toml + pyrightconfig) ---
python_version = 3.12

; --- Strictness floor ---
; Use `strict` as one source of truth. Never approximate it with manual flags —
; you'll miss flags added in future mypy releases.
strict = True

; Enable progressively once strict = True is stable:
; disallow_any_explicit = True    ; Forbids explicit `x: Any` annotations
; warn_unreachable = True         ; Flags dead code after early returns / raises

; --- Plugin integrations (add only what the project uses) ---
plugins = pydantic.mypy
; plugins = pydantic.mypy, sqlalchemy.ext.mypy.plugin

; --- Scope ---
; Explicitly list source directories; prevents mypy from crawling .venv, dist, etc.
; files = src, tests
; exclude = (^|/)(\.venv|tmp|__pycache__|build|dist|alembic)(/|$)

; --- Reporting ---
show_error_codes = True           ; Show [error-code] in each diagnostic line
pretty = True                     ; Colour + context lines in terminal output
warn_unused_configs = True        ; Warn if a per-module override matches nothing

; ---------------------------------------------------------------------------
; Third-party stub overrides
; RULE: ignore_missing_imports ONLY — never ignore_errors for first-party code.
; ignore_errors = True suppresses ALL diagnostics (syntax errors, real type
; errors, everything). It should only appear for generated/vendor code.
; ---------------------------------------------------------------------------

; [mypy-authlib]
; ignore_missing_imports = True

; [mypy-authlib.*]
; ignore_missing_imports = True

; [mypy-lxml]
; ignore_missing_imports = True

; [mypy-lxml.*]
; ignore_missing_imports = True

; [mypy-pgvector]
; ignore_missing_imports = True

; [mypy-pgvector.*]
; ignore_missing_imports = True

; ---------------------------------------------------------------------------
; Legacy / generated module overrides
; Use targeted flag relaxations. Only use ignore_errors for truly unmaintainable
; code (generated outputs, vendor code) — never for first-party modules.
; ---------------------------------------------------------------------------

; [mypy-my_project.legacy.*]
; disallow_untyped_defs = False
; warn_return_any = False

; [mypy-my_project.generated.*]
; ignore_errors = True           ; Last resort: generated code only
