services:
  app:
    build:
      context: .devcontainer
      dockerfile: Dockerfile
    command: ["/home/conductor/init-claude-config.sh", "sleep", "infinity"]
    stdin_open: true
    tty: true
    volumes:
      - .:/workspaces/tmux-conductor:cached
      - ${HOME}/.claude:/host-claude-config/.claude:ro
      - ${HOME}/.claude.json:/host-claude-config/.claude.json:ro
      - /Users/davidtaylor/Repositories/tmux-conductor/hooks:/conductor-hooks:ro
      - /Users/davidtaylor/Repositories/tmux-conductor/logs/state:/conductor-state
    working_dir: /workspaces/tmux-conductor
    env_file:
      - ${HOME}/.conductor_env
    environment:
      - CONDUCTOR_STATE_DIR=/conductor-state
      - CONDUCTOR_AGENT_NAME=tmux-conductor
      - PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium
      - PUPPETEER_SKIP_DOWNLOAD=true
      - PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true
    extra_hosts:
      - "host.docker.internal:host-gateway"
