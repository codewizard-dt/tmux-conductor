name: tmux-conductor

services:
  dashboard:
    image: ghcr.io/codewizard-dt/tmux-conductor-dashboard:latest
    ports:
      - "${BACKEND_PORT:-8788}:${BACKEND_PORT:-8788}"
    env_file:
      - .env
    environment:
      HOST: "${HOST:-0.0.0.0}"
      BACKEND_PORT: "${BACKEND_PORT:-8788}"
      CONDUCTOR_CONF: /app/conductor.conf
    volumes:
      - ./conductor.conf:/app/conductor.conf
      - ./logs/state:/app/logs/state:ro
      - ./tasks.txt:/app/tasks.txt
      - /tmp:/tmp
    user: "${UID:-1000}:${GID:-1000}"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-qO-",
          "http://{HOST:-0.0.0.0}:${BACKEND_PORT:-8788}/api/healthz",
        ]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
