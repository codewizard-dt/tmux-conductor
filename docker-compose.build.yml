services:
  dashboard:
    build:
      context: backend
      dockerfile: Dockerfile.dev
    ports:
      - "${BACKEND_PORT:-8788}:8788"
    environment:
      HOST: "${HOST:-0.0.0.0}"
      PORT: "${BACKEND_PORT:-8788}"
      CONDUCTOR_CONF: /app/conductor.conf
    volumes:
      - ./backend:/app
      - /app/node_modules
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8788/api/healthz"]
      interval: 10s
    command: node --watch --experimental-strip-types index.ts

  ui:
    build:
      context: frontend
      dockerfile: Dockerfile.dev
    ports:
      - "${FRONTEND_PORT:-4321}:4321"
    environment:
      PUBLIC_API_URL: "${PUBLIC_API_URL:-/api}"
    # command: npm run dev -- --host localhost
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      dashboard:
        condition: service_healthy
    restart: unless-stopped
