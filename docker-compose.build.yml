services:
  dashboard:
    build:
      context: scripts/dashboard/server
      dockerfile: Dockerfile.dev
    ports:
      - "${PORT:-8788}:8788"
    environment:
      HOST: "0.0.0.0"
      PORT: "8788"
      CONDUCTOR_CONF: /app/conductor.conf
    volumes:
      - ./scripts/dashboard/server:/app
      - /app/node_modules
    command: node --watch index.js
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8788/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  ui:
    build:
      context: scripts/dashboard/ui
      dockerfile: Dockerfile.dev
    ports:
      - "${UI_PORT:-4321}:4321"
    environment:
      - PUBLIC_API_URL=http://localhost:8788/api
    volumes:
      - ./scripts/dashboard/ui:/app
      - /app/node_modules
    depends_on:
      dashboard:
        condition: service_healthy
    restart: unless-stopped
