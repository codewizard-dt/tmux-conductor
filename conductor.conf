# ──────────────────────────────────────────────
# conductor.conf — Edit this, not the scripts
# ──────────────────────────────────────────────

# --- Session ---
# Name of the tmux session that will hold all agent panes and the monitor.
SESSION_NAME="conductor"

# --- Agents ---
# Bash 4+ indexed array of agent definitions.
# Each entry uses the format: <name>:<working_dir>:<launch_cmd>
#   name        — unique label, used as the tmux window name
#   working_dir — absolute path where the agent's pane starts
#   launch_cmd  — shell command that starts the agent CLI
#                 For Claude Code: "claude --dangerously-skip-permissions"

# Flags passed to every agent launch command (appended when not already in launch_cmd).
# Default enables non-interactive operation for automated orchestration.
CLAUDE_FLAGS="--dangerously-skip-permissions"

AGENTS=(
  "wetware:/Users/davidtaylor/Repositories/gauntlet/wetware-factory:claude --dangerously-skip-permissions"
  "tmux-conductor:/Users/davidtaylor/Repositories/tmux-conductor:claude --dangerously-skip-permissions"
  "bootstrap:/Users/davidtaylor/Repositories/bootstrap-claude:claude --dangerously-skip-permissions"
)

# --- Background processes ---
# Host-side auxiliary processes (dev servers, watchers, log tailers) that
# should run in their own tmux window alongside the agents. No idle polling,
# no queue dispatch.
#
# Each entry uses the format: <name>:<working_dir>:<launch_cmd>
#   name        — unique tmux window name (must not collide with AGENTS)
#   working_dir — absolute path where the process starts
#   launch_cmd  — the shell command (avoid ':' in the command itself)
BG_PROCESSES=(
  "uat-sleep:/tmp:sleep 300"
)

# --- Agent ↔ bg-process links ---
# Declare which bg process is "owned by" each agent.
# Linked agents receive three extra env vars at spawn time:
#   CONDUCTOR_BG_NAME  — name of the linked bg process
#   CONDUCTOR_BG_LOG   — path to its captured log file ($LOG_DIR/bg-<name>.log)
#   CONDUCTOR_BG_STATE — path to its liveness state file ($STATE_DIR/bg-<name>.state)
# The agent can then do: cat $CONDUCTOR_BG_LOG, cat $CONDUCTOR_BG_STATE (alive|dead).
# Format: "<agent-name>:<bg-process-name>"
AGENT_BG_LINKS=(
  # "my-agent:uat-sleep"
)

# --- Slash commands (vendor-specific vocabulary) ---
# Command sent to an agent to clear its context before a new task.
CLEAR_CMD="/clear"

# --- Idle detection ---
# Primary signal: hooks/claude-hook.sh writes $STATE_DIR/<agent>.state. This
# regex is only consulted when the state file is missing or older than
# 2 * POLL_INTERVAL (fallback layer, e.g. for Aider which has no hooks).
#
# A grep-compatible regex matched against the last 5 lines of capture-pane
# output to determine if an agent is waiting for input (i.e. finished working).
#
# Examples by vendor:
#   Claude Code (v2.x):  "\\?[[:space:]]+for[[:space:]]+shortcuts|(accept edits|bypass permissions) on"
#                        — matches idle footers; plan mode + active-run correctly read as BUSY
#   Claude Code (older): "^[[:space:]]*[>›]"   — ASCII ">" or single-angle "›" prompt
#   Codex:               "^codex>"
#   Aider:               "^aider>"
IDLE_PATTERN="\\?[[:space:]]+for[[:space:]]+shortcuts|(accept edits|bypass permissions) on \\(shift\\+tab to cycle\\)"

# Regex matched against the same pane tail BEFORE IDLE_PATTERN. If it matches,
# the agent is considered busy even when IDLE_PATTERN also matches — current
# Claude Code keeps the permission-mode footer visible while working, so the
# "esc to interrupt" indicator is the reliable busy signal.
BUSY_PATTERN="esc to interrupt"

# Regex matched against the last non-blank line of a busy agent's pane to
# detect that it is waiting for interactive input. Matches classic prompts
# (ends with ?, [Y/n], [y/N], or >) plus Claude Code dialog footers
# (AskUserQuestion / plan-approval: "Enter to select · … · Esc to cancel").
# Case matters: the busy spinner footer uses lowercase "esc to interrupt" —
# never make this case-insensitive. When matched while state is "busy",
# monitor.sh writes "awaiting" to the state file; the dashboard backend also
# evaluates this pattern read-only for 2s responsiveness.
AWAITING_PATTERN='(\?$|\[Y/n\]|\[y/N\]|>$|Enter to (select|confirm|submit)|Esc to (cancel|go back))'

# Seconds between idle-detection polls. Also acts as a debounce — a short
# interval risks false positives while an agent's tool calls are mid-flight.
POLL_INTERVAL=15

# --- Usage monitoring ---
# A command that exits 0 if usage is OK, exits 1 if the limit is hit.
# The conductor runs this before dispatching a new task to a pane.
# If it exits 1, that pane is paused (no new tasks dispatched).
# If ALL panes are paused, the conductor shuts down gracefully.
#
# Examples:
#   Claude:  parse `claude usage` output for quota exceeded
#   OpenAI:  check `codex usage` or call the billing API
#   Always OK (no limit checking): "/bin/true"
USAGE_CHECK_CMD='claude usage 2>/dev/null | grep -qi "extra usage" && exit 1 || exit 0'

# --- SQLite database ---
# Path to the conductor SQLite database file (resolved relative to this conf file).
# Created automatically on first backend start; gitignored via data/ entry.
DB_PATH="./data/conductor.db"

# --- Task queue ---
# A file with one task/prompt per line. The conductor pops from the top.
# When the queue is empty, agents stay idle until a new task is enqueued.
#
# Lines can be scoped to a specific agent using a "name: " prefix.
# The prefix must match an agent name from the AGENTS array above.
# Unprefixed lines are global — dispatched to any idle agent.
#
# Examples:
#   jobfinder: /tackle .docs/tasks/active/003-resume-parser.md   # jobfinder only
#   webapp: Review the auth middleware                            # webapp only
#   /tackle .docs/tasks/active/005-shared-lib.md                 # any agent
TASK_QUEUE="./tasks.txt"

# --- Logging ---
# Directory where per-agent log files are written (host side).
# monitor.sh appends one JSONL record per dispatch to $LOG_DIR/dispatch.jsonl
# (fields: ts, agent, command, state, state_age_s, detection, queue,
#  queue_remaining, pane_tail).
LOG_DIR="./logs"

# --- Agent state directory ---
# Per-agent lifecycle state written by Claude Code hooks
# (see hooks/on-session-start.js, on-prompt-submit.js, on-stop.js,
# on-stop-failure.js). Each agent writes idle|busy to
# $STATE_DIR/<agent-name>.state. monitor.sh reads these files to decide
# idle/busy; IDLE_PATTERN above is the fallback when the state file is
# missing or stale (older than 2 * POLL_INTERVAL).
STATE_DIR="./logs/state"
