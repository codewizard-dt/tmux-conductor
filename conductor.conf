# ──────────────────────────────────────────────
# conductor.conf — Edit this, not the scripts
# ──────────────────────────────────────────────

# --- Session ---
# Name of the tmux session that will hold all agent panes and the monitor.
SESSION_NAME="conductor"

# --- Agents ---
# Bash 4+ indexed array of agent definitions.
# Each entry uses the format: <name>:<working_dir>:<launch_cmd>
#   name        — unique label, used as the tmux window name
#   working_dir — absolute path where the agent's pane starts
#   launch_cmd  — the shell command that starts the agent CLI
AGENTS=(
  "backend:/path/to/project:claude --dangerously-skip-permissions"
  "frontend:/path/to/project/frontend:claude --dangerously-skip-permissions"
  "tests:/path/to/project:codex --auto"
)

# --- Slash commands (vendor-specific vocabulary) ---
# Command sent to an agent to clear its context before a new task.
CLEAR_CMD="/clear"

# Default command dispatched when the task queue is empty.
# Useful for agents that self-select work (e.g. via /tackle or /next-task).
TASK_CMD="/tackle"

# --- Idle detection ---
# A grep-compatible regex matched against the last 5 lines of capture-pane
# output to determine if an agent is waiting for input (i.e. finished working).
#
# Examples by vendor:
#   Claude Code: "^>"        — prompt line starts with ">"
#   Codex:       "^codex>"   — prompt line starts with "codex>"
#   Aider:       "^aider>"   — prompt line starts with "aider>"
IDLE_PATTERN="^>"

# Seconds between idle-detection polls. Also acts as a debounce — a short
# interval risks false positives while an agent's tool calls are mid-flight.
POLL_INTERVAL=15

# --- Usage monitoring ---
# A command that exits 0 if usage is OK, exits 1 if the limit is hit.
# The conductor runs this before dispatching a new task to a pane.
# If it exits 1, that pane is paused (no new tasks dispatched).
# If ALL panes are paused, the conductor shuts down gracefully.
#
# Examples:
#   Claude:  parse `claude usage` output for quota exceeded
#   OpenAI:  check `codex usage` or call the billing API
#   Always OK (no limit checking): "/bin/true"
USAGE_CHECK_CMD='claude usage 2>/dev/null | grep -qi "extra usage" && exit 1 || exit 0'

# --- Task queue ---
# A file with one task/prompt per line. The conductor pops from the top.
# When the file is empty and TASK_CMD is set, TASK_CMD is sent instead.
# When both are exhausted, agents finish their current work and stop.
TASK_QUEUE="./tasks.txt"

# --- Logging ---
# Directory where per-agent log files are written.
LOG_DIR="./logs"

# --- Execution mode ---
# "local"     — agents run directly on the host inside tmux panes
# "container" — agents run via agent_exec.sh, which execs into a dev container
EXEC_MODE="local"

# --- Docker Compose settings (used when EXEC_MODE="container") ---
# Non-standard compose filename so it doesn't collide with your project's
# docker-compose.yml.
COMPOSE_FILE="conductor-compose.yml"

# The service name inside the compose file to exec into.
COMPOSE_SERVICE="app"
