# DigitalOcean App Platform spec. Deploy: doctl apps create --spec deploy/app.yaml
# (or doctl apps update <app-id> --spec deploy/app.yaml, i.e. `make deploy-app`).
#
# ⚠️  Applying this spec with `doctl apps update --spec` REPLACES the whole app
#     config. Two footguns that have caused outages:
#     1. SECRET envs (DATABASE_URL, BETTER_AUTH_SECRET) are declared here with NO
#        `value:` — applying the spec CLEARS them (the container then crash-loops on
#        "X is required but not set"). Before `make deploy-app`, re-supply the
#        encrypted `EV[1:...]` values (read them from `doctl apps get <id> -o json`)
#        or set them in the App Platform UI immediately after.
#     2. The `domains:` block below MUST stay — omitting it DETACHES
#        tmux.davidtaylor.codes, which breaks TLS (handshake_failure) for everyone
#        while the default *.ondigitalocean.app hostname keeps working.
name: tmux-conductor
region: nyc
domains:
  - domain: tmux.davidtaylor.codes
    type: PRIMARY
    zone: davidtaylor.codes
services:
  - name: api
    github:
      repo: codewizard-dt/tmux-conductor
      branch: main
      deploy_on_push: true
    source_dir: /
    dockerfile_path: app/api/Dockerfile
    http_port: 8080
    # instance_count MUST stay at 1 — the relay connection registry is in-process memory.
    # Horizontal scale requires a pub/sub layer (Phase 5). See app/api/relay/registry.ts.
    instance_count: 1
    health_check:
      http_path: /healthz
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
      - key: BETTER_AUTH_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: GOOGLE_CLIENT_ID
        scope: RUN_TIME
        value: ""
      - key: GOOGLE_CLIENT_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: PUBLIC_BASE_URL
        scope: RUN_TIME
        value: ${APP_URL}
      # Same-origin ingress: the frontend is served from the same ${APP_URL} as the
      # api, so better-auth's trustedOrigins / @fastify/cors must trust that origin.
      - key: CORS_ORIGIN
        scope: RUN_TIME
        value: "localhost:4321,${APP_URL},https://tmux.davidtaylor.codes"
      # Required by env.ts (hard-fail if unset). The single bootstrap admin that
      # bypasses the invite-code gate. MUST match the frontend VITE_ADMIN_EMAIL.
      - key: BOOTSTRAP_ADMIN_EMAIL
        scope: RUN_TIME
        value: doctordeetz@gmail.com
      # Enables better-auth Secure cookies (TLS is terminated at the App Platform edge).
      - key: NODE_ENV
        scope: RUN_TIME
        value: production
static_sites:
  - name: frontend
    github:
      repo: codewizard-dt/tmux-conductor
      branch: main
      deploy_on_push: true
    source_dir: app/frontend
    build_command: npm ci && npm run build
    output_dir: dist
    envs:
      # Admin invite-codes UI gate (build-time). MUST match the api BOOTSTRAP_ADMIN_EMAIL.
      # The frontend calls /api on the same origin (ingress), so VITE_API_URL is left
      # unset and the code falls back to the relative "/api" base.
      - key: VITE_ADMIN_EMAIL
        scope: BUILD_TIME
        value: doctordeetz@gmail.com
# DATABASE_URL points at the pre-existing managed cluster "tmux-conductor-db"
# (set as a SECRET on the api service), so no App Platform-managed database block.
# Ingress: frontend owns "/", the api owns "/api" and "/relay".
# App Platform TRIMS the matched prefix by default before forwarding:
#   - "/api"  is trimmed — app/api registers de-prefixed routes ("/auth/*",
#     "/devices", "/pair/*"); see commit e91c1bc.
#   - "/relay" MUST set preserve_path_prefix: true — the relay routes keep the
#     full path ("/relay/:deviceId" WS upgrade + "/relay/:deviceId/*" catch-all),
#     so trimming would break them. This rule MUST precede the "/" catch-all so
#     daemon WebSocket upgrades reach the api service instead of the static site.
# These ingress rules only take effect via `doctl apps update --spec`
# (make deploy-app) — deploy_on_push rebuilds code but does NOT re-apply the spec.
ingress:
  rules:
    - match:
        path:
          prefix: /api
      component:
        name: api
    - match:
        path:
          prefix: /relay
      component:
        name: api
        preserve_path_prefix: true
    - match:
        path:
          prefix: /
      component:
        name: frontend
