# DigitalOcean App Platform spec. Deploy: doctl apps create --spec deploy/app.yaml
# (or doctl apps update <app-id> --spec deploy/app.yaml). Replace OWNER below.
name: tmux-conductor
region: nyc
services:
  - name: api
    github:
      repo: codewizard-dt/tmux-conductor
      branch: main
      deploy_on_push: true
    source_dir: /
    dockerfile_path: app/api/Dockerfile
    http_port: 8080
    # instance_count MUST stay at 1 — the relay connection registry is in-process memory.
    # Horizontal scale requires a pub/sub layer (Phase 5). See app/api/relay/registry.ts.
    instance_count: 1
    health_check:
      http_path: /healthz
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
      - key: BETTER_AUTH_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: GOOGLE_CLIENT_ID
        scope: RUN_TIME
        value: ""
      - key: GOOGLE_CLIENT_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: PUBLIC_BASE_URL
        scope: RUN_TIME
        value: ${APP_URL}
      # Same-origin ingress: the frontend is served from the same ${APP_URL} as the
      # api, so better-auth's trustedOrigins / @fastify/cors must trust that origin.
      - key: CORS_ORIGIN
        scope: RUN_TIME
        value: ${APP_URL}
      # Required by env.ts (hard-fail if unset). The single bootstrap admin that
      # bypasses the invite-code gate. MUST match the frontend VITE_ADMIN_EMAIL.
      - key: BOOTSTRAP_ADMIN_EMAIL
        scope: RUN_TIME
        value: doctordeetz@gmail.com
      # Enables better-auth Secure cookies (TLS is terminated at the App Platform edge).
      - key: NODE_ENV
        scope: RUN_TIME
        value: production
static_sites:
  - name: frontend
    github:
      repo: codewizard-dt/tmux-conductor
      branch: main
      deploy_on_push: true
    source_dir: app/frontend
    build_command: npm ci && npm run build
    output_dir: dist
    envs:
      # Admin invite-codes UI gate (build-time). MUST match the api BOOTSTRAP_ADMIN_EMAIL.
      # The frontend calls /api on the same origin (ingress), so VITE_API_URL is left
      # unset and the code falls back to the relative "/api" base.
      - key: VITE_ADMIN_EMAIL
        scope: BUILD_TIME
        value: doctordeetz@gmail.com
# DATABASE_URL points at the pre-existing managed cluster "tmux-conductor-db"
# (set as a SECRET on the api service), so no App Platform-managed database block.
# Ingress: frontend owns "/", the api is mounted under "/api" so the two
# components don't collide on the same path prefix. NOTE: no `rewrite` — the
# "/api" prefix is preserved so it reaches app/api's own "/api/auth/*" routes.
ingress:
  rules:
    - match:
        path:
          prefix: /api
      component:
        name: api
    - match:
        path:
          prefix: /
      component:
        name: frontend
